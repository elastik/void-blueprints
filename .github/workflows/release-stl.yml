name: Release STL Assets

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload STL assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: cad/export/stl/*.stl
